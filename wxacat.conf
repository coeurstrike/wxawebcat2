# ============================================================================
# WebL8.AI - Web Classification & Categorization System
# Configuration File: wxacat.conf
# ============================================================================

[database]
# Database driver: postgresql or sqlite
# SQLite is simpler (no server needed), PostgreSQL is more scalable
driver = sqlite
# For SQLite, 'name' is the file path:
name = ./data/wxacat.db
# PostgreSQL settings (ignored if driver=sqlite)
host = localhost
port = 5432
user = wxacat_user
password = your_secure_password_here
# Connection pool settings (PostgreSQL only)
pool_min_size = 2
pool_max_size = 10

[tables]
# Database table names
classifications = domain_classifications
customers = customers
query_log = query_log

[directories]
# Working directories (relative or absolute paths)
base_dir = ./data
queue_dir = ./data/queue
processing_dir = ./data/processing
processed_dir = ./data/processed
failed_dir = ./data/failed
logs_dir = ./logs

[files]
# File extensions
crawl_extension = .json
processed_extension = .json.txt
failed_log = failed.csv

[crawler]
# Crawler settings
concurrency = 5
page_timeout = 60000
user_agent = Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

[classifier]
# Classification settings
poll_interval = 10
batch_size = 10

[openai]
# OpenAI API settings
api_key = your_openai_api_key_here
model = gpt-4o-mini
max_tokens = 500
temperature = 0.1

[cache]
# Cache/staleness settings
stale_days = 30
# How many days before a classification is considered stale and needs refresh

[api]
# FastAPI settings
host = 0.0.0.0
port = 8000
debug = false
# Rate limiting defaults for new customers
default_queries_per_day = 100

[security]
# API key settings
api_key_length = 32
api_key_prefix = wl8_
