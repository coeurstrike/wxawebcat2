# WebL8.AI - Docker Compose
# Usage: docker-compose up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wxacat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wxacat_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_DB: wxacat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wxacat_user -d wxacat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Web Application
  api:
    build: .
    container_name: wxacat-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - WXACAT_DATABASE_HOST=postgres
      - WXACAT_DATABASE_PORT=5432
      - WXACAT_DATABASE_NAME=wxacat_db
      - WXACAT_DATABASE_USER=wxacat_user
      - WXACAT_DATABASE_PASSWORD=${DB_PASSWORD:-changeme123}
      - WXACAT_OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./wxacat.conf:/app/wxacat.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  # Crawler Service
  crawler:
    build: .
    container_name: wxacat-crawler
    restart: unless-stopped
    environment:
      - WXACAT_DATABASE_HOST=postgres
      - WXACAT_DATABASE_PORT=5432
      - WXACAT_DATABASE_NAME=wxacat_db
      - WXACAT_DATABASE_USER=wxacat_user
      - WXACAT_DATABASE_PASSWORD=${DB_PASSWORD:-changeme123}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./wxacat.conf:/app/wxacat.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Crawler runs on-demand, not as daemon
    # Use: docker-compose run crawler python crawler.py -f urls.txt
    command: ["tail", "-f", "/dev/null"]
    profiles:
      - tools

  # Classifier Service (daemon)
  classifier:
    build: .
    container_name: wxacat-classifier
    restart: unless-stopped
    environment:
      - WXACAT_DATABASE_HOST=postgres
      - WXACAT_DATABASE_PORT=5432
      - WXACAT_DATABASE_NAME=wxacat_db
      - WXACAT_DATABASE_USER=wxacat_user
      - WXACAT_DATABASE_PASSWORD=${DB_PASSWORD:-changeme123}
      - WXACAT_OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./wxacat.conf:/app/wxacat.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: python classifier.py

volumes:
  postgres_data:
